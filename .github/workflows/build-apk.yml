name: Build APK

# 触发条件：支持手动触发
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 配置Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      # 4. 修复Windows换行符问题
      - name: Fix gradlew line endings
        run: sed -i 's/\r$//' gradlew

      # 5. 给gradlew添加执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ------------------- 关键修改点 -------------------
      # 6. 【合并清理+构建】仅执行一次，避免重复构建
      - name: Build Release APK
        run: ./gradlew clean assembleRelease --no-build-cache
      # -------------------------------------------------

      # --- 签名流程开始 ---
      # 7. 生成临时签名密钥
      - name: 生成临时签名密钥
        run: |
          keytool -genkey -v -keystore my-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 \
          -alias myalias -storepass password789 -keypass password789 \
          -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, S=Unknown, C=Unknown"

      # 8. 用jarsigner签名APK
      - name: 用jarsigner签名APK
        run: |
          jarsigner -verbose \
            -keystore my-release-key.jks \
            -storepass password789 \
            -keypass password789 \
            -signedjar app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            myalias

      # 9. 自定义APK文件名
      - name: Rename APK
        run: |
          VERSION=$(grep versionName app/build.gradle | awk '{print $2}' | tr -d '"')
          DATE=$(date +%Y-%m-%d)
          TIME=$(date +%H:%M:%S)
          
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "BUILD_TIME=$TIME" >> $GITHUB_ENV
          
          NEW_NAME="X-screen_v${VERSION}_${DATE}.apk"
          mv app/build/outputs/apk/release/app-release-signed.apk app/build/outputs/apk/release/$NEW_NAME
          echo "APK_FILE=app/build/outputs/apk/release/$NEW_NAME" >> $GITHUB_ENV
      
      # 10. 发布到GitHub Release
      - name: Upload Release APK
        uses: softprops/action-gh-release@v2
        with:
          name: "X-screen-v${{ github.run_number }} (v${{ env.VERSION }})"
          files: ${{ env.APK_FILE }}
          tag_name: "v${{ env.VERSION }}"
          body: |
            ✅ 编译完成！
            📱 应用版本: v${{ env.VERSION }}
            📅 编译时间: ${{ env.DATE }} ${{ env.BUILD_TIME }}
            📦 构建编号: ${{ github.run_number }}
          overwrite_files: true
