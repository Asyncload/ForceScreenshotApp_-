name: Build APK

on:
  workflow_dispatch:  # 手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4  # 使用 Java v4 避免报错
      with:
        java-version: '17'
        distribution: 'adopt'

    #- name: Grant execute permission for gradlew
      #run: chmod +x gradlew
    - name: Build with Gradle
      run: gradle build


    #- name: Build with Gradle
      #run: ./gradlew assembleDebug

    - name: 上传到 Release
      uses: ncipollo/release-action@v1
      with:
          # 授权令牌（GitHub自动提供，无需修改）
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # 你的 APK 文件路径（保持和你之前一致）
          artifacts: "app/build/outputs/apk/debug/*.apk"
          
          # 发布的标题（这里设为 "Auto Build" 加上提交信息）
          name: "Auto Build ${{ github.run_number }}"
          
          # 发布的说明（自动填入提交信息）
          body: ${{ github.event.head_commit.message }}
          
          # 标签名：使用 run_id 确保每次构建都是唯一的，不会冲突
          tag: "build-${{ github.run_id }}"
          
          # 是否覆盖同名文件（设为 true）
          overwrite: true
          
          # 是否作为草稿发布（false 表示直接发布可见）
          draft: false
          
